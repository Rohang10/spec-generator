services:
  - type: web
    name: spec-generator-backend
    env: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MAX_RETRIES
        value: 2
      - key: PYTHON_VERSION
        value: 3.11.10
